apiVersion: v1
kind: Service
metadata:
  name: taskflow-api
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: taskflow-api
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-websocket
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-websocket
    app.kubernetes.io/component: websocket
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: websocket
      protocol: TCP
      name: websocket
  selector:
    app.kubernetes.io/name: taskflow-websocket
---
apiVersion: v1
kind: Service
metadata:
  name: taskflow-api-headless
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-api
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 8000
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/name: taskflow-api
