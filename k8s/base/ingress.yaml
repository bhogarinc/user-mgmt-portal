apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-api
  namespace: taskflow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://taskflow.io, https://app.taskflow.io"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
spec:
  tls:
    - hosts:
        - api.taskflow.io
      secretName: taskflow-api-tls
  rules:
    - host: api.taskflow.io
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: taskflow-api
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: taskflow-api
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: taskflow-api
                port:
                  number: 80
          - path: /openapi.json
            pathType: Exact
            backend:
              service:
                name: taskflow-api
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskflow-websocket
  namespace: taskflow
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "upgrade $http_upgrade; connection \"upgrade\""
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - ws.taskflow.io
      secretName: taskflow-websocket-tls
  rules:
    - host: ws.taskflow.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: taskflow-websocket
                port:
                  number: 8002
