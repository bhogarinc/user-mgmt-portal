apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskflow-api
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-api
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taskflow-api-role
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-api
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["taskflow-db-credentials", "taskflow-redis-credentials", "taskflow-app-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taskflow-api-rolebinding
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-api
subjects:
  - kind: ServiceAccount
    name: taskflow-api
    namespace: taskflow
roleRef:
  kind: Role
  name: taskflow-api-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: taskflow-api-pdb
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: taskflow-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: taskflow-websocket-pdb
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow-websocket
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: taskflow-websocket
